name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"

permissions:
  contents: read

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/palmerge
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            binary: target/x86_64-pc-windows-msvc/release/palmerge.exe
          - os: macos-14
            target: aarch64-apple-darwin
            platform: macos-apple-silicon
            binary: target/aarch64-apple-darwin/release/palmerge
          - os: macos-13
            target: x86_64-apple-darwin
            platform: macos-intel
            binary: target/x86_64-apple-darwin/release/palmerge
    runs-on: ${{ matrix.os }}
    env:
      BINARY: ${{ matrix.binary }}
      PLATFORM: ${{ matrix.platform }}
      TARGET: ${{ matrix.target }}
      VERSION_LABEL: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77"
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage Unix package
        if: runner.os != 'Windows'
        shell: bash
        run: |
          package="palmerge-${VERSION_LABEL}-${PLATFORM}"
          mkdir -p "dist/${package}"
          cp "${BINARY}" "dist/${package}/palmerge"
          cp README.md README.zh-CN.md LICENSE "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
      - name: Stage Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "palmerge-$env:VERSION_LABEL-$env:PLATFORM"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item $env:BINARY "dist/$package/palmerge.exe"
          Copy-Item README.md, README.zh-CN.md, LICENSE "dist/$package/"
          Compress-Archive -Path "dist/$package" -DestinationPath "dist/$package.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets
      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          prerelease=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            prerelease+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --verify-tag \
            --title "PalMerge ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes "Portable, read-only PalMerge build. See README.md or README.zh-CN.md before use. / PalMerge 便携只读版本，使用前请阅读 README.md 或 README.zh-CN.md。" \
            "${prerelease[@]}"

